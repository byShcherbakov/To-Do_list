<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>

</head>
<body>
    <div class="container">
        <div class="todo" data-js-todo >
            <h1 class="todo__title">To Do List</h1>

            <form class="todo_form" data-js-todo-new-task-form >
                <div class="todo_form field">
                    <label for="new-task" class="field_label">
                        New task title
                    </label>
                    <input
                    class="field_input"
                    id = "new-task"
                    placeholder=" "
                    autocomplete="off"
                    data-js-todo-new-task-input
                    />
                </div>
                <button class="btn" type="submit">add</button>
            </form>

            <form class="todo_form" data-js-todo-search-task-form >
                <div class="todo_form field" >
                    <label for="new-task" class="search_label">
                        Search task
                    </label>
                    <input
                            class="field_input"
                            id = "search-task"
                            placeholder=" "
                            autocomplete="off"
                            type="search"
                            data-js-todo-search-task-input
                    />


                </div>


            </form>

            <div class="todo_info">
                <div class="todo_total-tasks">
                    Total tasks:<span data-js-todo-total-tasks>0</span>
                </div>
                <button
                        class="todo_delete-all-btn"
                        type="button"
                        data-js-todo-delete-all-btn
                >
                    Delete All
                </button>
            </div>

            <ul class="todo_list" data-js-todo-list>
                <li class="todo_item todo-item" data-js-todo-item>
                    <input
                            class="todo_item_checkbox"
                            id = "todo-1"
                            type="checkbox"
                            data-todo-js-item-checkbox
                    />
                    <label class ="todo-item_label" for = "todo-1" data-js-todo-item-label>
                        Todo 1
                    </label>
                    <button
                            class = "todo-item_delete-button"
                            type ="button"
                            aria-label="Delete"
                            title="Delete"
                            data-js-todo-item-delete-btn
                    >
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15 5L5 15M5 5L15 15" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>

                    </button>
                </li>
                <li class="todo_item todo-item"data-js-todo-item>
                    <input
                            class="todo_item_checkbox"
                            id = "todo-1"
                            type="checkbox"
                            data-todo-js-item-checkbox
                    />
                    <label class ="todo-item_label" for = "todo-1" data-js-todo-item-label>
                        Todo 1
                    </label>
                    <button
                            class = "todo-item_delete-button"
                            type ="button"
                            aria-label="Delete"
                            title="Delete"
                            data-js-todo-item-delete-btn
                    >
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15 5L5 15M5 5L15 15" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>

                    </button>
                </li>
            </ul>
            <div class="todo_empty-message" data-js-todo-empty-message></div>
        </div>

    </div>

    <script src="./js/main.js" defer></script>
</body>
</html>
